name: Deploy Test

on:
  push:
    branches: [testing]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy Test
        run: |
          curl -X POST "https://api.render.com/v1/services/${{ secrets.RENDER_TEST }}/deploys" \
          -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}"